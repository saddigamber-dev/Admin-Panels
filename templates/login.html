<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Neon Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <img src="https://i.ibb.co/1GBn25c5/VID-20260310-172522-610-ezgif-com-video-to-gif-converter.gif" alt="Logo" class="logo">
        <h2>Login to Dashboard</h2>
        
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>
        
        <p class="auth-link">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        
        <!-- Support Section -->
        <div class="support-section" style="margin-top: 2rem;">
            <h3><i class="fas fa-headset"></i> Need Help?</h3>
            <div class="support-grid" style="grid-template-columns: 1fr 1fr;">
                <a href="https://t.me/SMGrowMarthqofc" target="_blank" class="support-card telegram">
                    <i class="fab fa-telegram"></i>
                    <span>Telegram Support</span>
                    <small>Click to chat with admin</small>
                </a>
                <a href="https://whatsapp.com/channel/0029Vb8933MC6ZvoqBiPVq2h" target="_blank" class="support-card whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    <span>WhatsApp Channel</span>
                    <small>Join for updates</small>
                </a>
            </div>
        </div>
    </div>

    <style>
        .support-section {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid var(--accent-pink);
        }
        
        .support-section h3 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        
        .support-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .support-card {
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        
        .support-card i {
            font-size: 2rem;
        }
        
        .support-card span {
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .support-card small {
            font-size: 0.7rem;
            opacity: 0.8;
        }
        
        .support-card.telegram {
            background: linear-gradient(145deg, #0088cc, #006699);
            color: white;
        }
        
        .support-card.telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4);
        }
        
        .support-card.whatsapp {
            background: linear-gradient(145deg, #25D366, #128C7E);
            color: white;
        }
        
        .support-card.whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }
        
        @media (max-width: 480px) {
            .support-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
